services:
  - type: web
    name: health-lab-report-analyzer
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: PASSWORD_SALT
        generateValue: true
